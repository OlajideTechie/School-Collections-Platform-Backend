name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
  
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/unused_db
      PORT: 5000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run prisma:generate

      - name: Run tests
        run: npm test

      - name: Verify Docker Build
        run: docker build --build-arg DATABASE_URL="$DATABASE_URL" -t school-collections-backend .

      - name: Verify Docker Compose Config
        run: docker compose config
